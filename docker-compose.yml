services:
  db:
    image: postgres:16-alpine
    container_name: programs-strategies-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ProgramsStrategies}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - programs_strategies_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: programs-strategies-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__ConnStr: Host=db;Port=5432;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD};Database=${POSTGRES_DB:-ProgramsStrategies}
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN:?Set CORS_ALLOWED_ORIGIN}
      Authentication__Schemes__Bearer__ValidIssuer: ${JWT_VALID_ISSUER:-programs-strategies-api}
      Authentication__Schemes__Bearer__ValidAudiences__0: ${JWT_VALID_AUDIENCE:?Set JWT_VALID_AUDIENCE}
      Authentication__Schemes__Bearer__SigningKeys__0__Value: ${JWT_SIGNING_KEY:?Set JWT_SIGNING_KEY}
    ports:
      - "8080:5000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: programs-strategies-client
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  programs_strategies_db_data:
